		137DBD6A2E04798800657C42 /* Run Script */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			name = "Run Script";
			shellPath = /bin/sh;
			shellScript = (
				"if [ \"$ACTION\" = \"build\" ]; then",
				"    # Get current date in YYYYMMDD format",
				"    BUILD=$(date +\"%Y%m%d\")",
				"    #agvtool new-version -all $BUILD",
				"    ",
				"    VERSION=$(/usr/libexec/PlistBuddy \\",
				"        -c \"Print :CFBundleShortVersionString\" \\",
				"        \"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\")",
				"  ",
				"    BUILD=$(/usr/libexec/PlistBuddy \\",
				"        -c \"Print :CFBundleVersion\" \\",
				"        \"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\")",
				"  ",
				"    MIN_OS=$(/usr/libexec/PlistBuddy \\",
				"        -c \"Print :LSMinimumSystemVersion\" \\",
				"        \"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\")",
				"        ",
				"    if [[ \"$ARCHS_STANDARD\" == *\"arm64\"* && \"$ARCHS_STANDARD\" == *\"x86_64\"* ]]; then",
				"        ARCHITECTURE=\"universal\"",
				"    else",
				"        ARCHITECTURE=\"$ARCHS\"",
				"    fi",
				"",
				"echo \"{\\n\\",
				"    \\\"latestVersion\\\": \\\"${VERSION}.${BUILD}\\\",\\n\\",
				"    \\\"build\\\": \\\"${BUILD}\\\",\\n\\",
				"    \\\"downloadURL\\\": \\\"http://insoft.uk/action/?method=downlink&path=macos&file=xprime-installer-${ARCHITECTURE}.zip\\\",\\n\\",
				"    \\\"minimumOS\\\": \\\"${MIN_OS}\\\",\\n\\",
				"    \\\"architecture\\\": \\\"${ARCHITECTURE}\\\",\\n\\",
				"    \\\"releaseNotesURL\\\": \\\"http://insoft.uk/xprime-release-notes.txt\\\"\\n\\",
				"}\" > xprime-app-version.json",
				"",
				"",
				"fi",
				"",
			);
		};
/* End PBXShellScriptBuildPhase section */

